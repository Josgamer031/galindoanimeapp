<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificador PWA - Galindo Anime</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #141519 0%, #0a0a0d 100%);
      color: #ffffff;
      padding: 20px;
      min-height: 100vh;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #F47521;
    }
    
    .header p {
      color: #a0a0a8;
      font-size: 14px;
    }
    
    .check-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s ease;
    }
    
    .check-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(244, 117, 33, 0.3);
    }
    
    .check-item input[type="checkbox"] {
      width: 24px;
      height: 24px;
      cursor: pointer;
      accent-color: #F47521;
      flex-shrink: 0;
    }
    
    .check-item.completed {
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.3);
    }
    
    .check-item.completed label {
      color: #10b981;
      text-decoration: line-through;
    }
    
    label {
      cursor: pointer;
      flex: 1;
      user-select: none;
    }
    
    .check-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }
    
    .check-item small {
      display: block;
      color: #6b6b76;
      font-size: 12px;
      margin-bottom: 8px;
    }
    
    .check-item.error {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
    }
    
    .check-item.error input[type="checkbox"] {
      accent-color: #ef4444;
    }
    
    .progress-bar {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      height: 8px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    
    .progress-fill {
      background: linear-gradient(90deg, #F47521, #FF9257);
      height: 100%;
      transition: width 0.3s ease;
      width: 0%;
    }
    
    .status-text {
      text-align: center;
      margin-bottom: 20px;
      font-size: 14px;
      color: #a0a0a8;
    }
    
    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 30px;
    }
    
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
    }
    
    .btn-primary {
      background: #F47521;
      color: white;
    }
    
    .btn-primary:hover {
      background: #FF7A42;
      transform: translateY(-2px);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    
    .alert {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #10b981;
      display: none;
    }
    
    .alert.show {
      display: block;
    }
    
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #F47521;
      margin: 30px 0 15px 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>✅ Verificador PWA</h1>
      <p>Galindo Anime - Checklist para Instalación en Android</p>
    </div>
    
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <div class="status-text">
      Completado: <strong id="progress">0</strong>/13
    </div>
    
    <div class="alert" id="alert">
      ✅ ¡Felicidades! Tu PWA está lista para desplegar en producción
    </div>
    
    <div class="section-title">📦 Preparación</div>
    
    <label class="check-item" id="item-1">
      <input type="checkbox">
      <div>
        <strong>Generar Iconos PNG</strong>
        <small>Ejecutar: npm run generate-icons</small>
      </div>
    </label>
    
    <label class="check-item" id="item-2">
      <input type="checkbox">
      <div>
        <strong>Verificar Icons en Carpeta</strong>
        <small>public/icons/ debe contener PNG files</small>
      </div>
    </label>
    
    <label class="check-item" id="item-3">
      <input type="checkbox">
      <div>
        <strong>Instalar Dependencias</strong>
        <small>npm install (Sharp para generar iconos)</small>
      </div>
    </label>
    
    <div class="section-title">🔨 Construcción</div>
    
    <label class="check-item" id="item-4">
      <input type="checkbox">
      <div>
        <strong>Construir Proyecto</strong>
        <small>npm run build sin errores</small>
      </div>
    </label>
    
    <label class="check-item" id="item-5">
      <input type="checkbox">
      <div>
        <strong>Verificar Archivos Generados</strong>
        <small>dist/ contiene index.html, manifest.json, sw.js</small>
      </div>
    </label>
    
    <div class="section-title">🌐 Despliegue</div>
    
    <label class="check-item" id="item-6">
      <input type="checkbox">
      <div>
        <strong>URL en HTTPS</strong>
        <small>Requerido para PWA (ej: https://tudominio.com)</small>
      </div>
    </label>
    
    <label class="check-item" id="item-7">
      <input type="checkbox">
      <div>
        <strong>Manifest.json Accesible</strong>
        <small>Verificar que se sirva desde /manifest.json</small>
      </div>
    </label>
    
    <label class="check-item" id="item-8">
      <input type="checkbox">
      <div>
        <strong>Service Worker Registrado</strong>
        <small>sw.js disponible y sw-register.js incluido en HTML</small>
      </div>
    </label>
    
    <label class="check-item" id="item-9">
      <input type="checkbox">
      <div>
        <strong>Index.html Actualizado</strong>
        <small>Incluye manifest link y meta tags PWA</small>
      </div>
    </label>
    
    <div class="section-title">📱 Verificación en Android</div>
    
    <label class="check-item" id="item-10">
      <input type="checkbox">
      <div>
        <strong>Probar en Chrome Mobile</strong>
        <small>Debe aparecer opción "Instalar app"</small>
      </div>
    </label>
    
    <label class="check-item" id="item-11">
      <input type="checkbox">
      <div>
        <strong>Verificar Manifest en DevTools</strong>
        <small>Application → Manifest sin errores</small>
      </div>
    </label>
    
    <label class="check-item" id="item-12">
      <input type="checkbox">
      <div>
        <strong>Verificar Service Worker</strong>
        <small>Application → Service Workers → Active</small>
      </div>
    </label>
    
    <label class="check-item" id="item-13">
      <input type="checkbox">
      <div>
        <strong>Instalar en Pantalla de Inicio</strong>
        <small>App aparece con ícono personalizado</small>
      </div>
    </label>
    
    <div class="action-buttons">
      <button class="btn-primary" onclick="markAll()">✓ Marcar Todo</button>
      <button class="btn-secondary" onclick="clearAll()">✗ Limpiar</button>
    </div>
  </div>
  
  <script>
    const totalItems = 13;
    
    function updateProgress() {
      const checked = document.querySelectorAll('.check-item input:checked').length;
      const percentage = (checked / totalItems) * 100;
      document.getElementById('progressFill').style.width = percentage + '%';
      document.getElementById('progress').textContent = checked;
      
      // Mostrar alerta cuando todo está completo
      const alert = document.getElementById('alert');
      if (checked === totalItems) {
        alert.classList.add('show');
      } else {
        alert.classList.remove('show');
      }
    }
    
    function markAll() {
      document.querySelectorAll('.check-item input').forEach(input => {
        input.checked = true;
        input.closest('.check-item').classList.add('completed');
      });
      updateProgress();
    }
    
    function clearAll() {
      document.querySelectorAll('.check-item input').forEach(input => {
        input.checked = false;
        input.closest('.check-item').classList.remove('completed');
      });
      updateProgress();
    }
    
    // Event listeners
    document.querySelectorAll('.check-item input').forEach(input => {
      input.addEventListener('change', function() {
        const item = this.closest('.check-item');
        if (this.checked) {
          item.classList.add('completed');
        } else {
          item.classList.remove('completed');
        }
        updateProgress();
      });
    });
    
    // Cargar estado guardado
    const saved = localStorage.getItem('pwa-checklist');
    if (saved) {
      JSON.parse(saved).forEach((checked, i) => {
        const input = document.querySelectorAll('.check-item input')[i];
        if (input && checked) {
          input.checked = true;
          input.closest('.check-item').classList.add('completed');
        }
      });
      updateProgress();
    }
    
    // Guardar estado
    document.querySelectorAll('.check-item input').forEach(input => {
      input.addEventListener('change', function() {
        const state = Array.from(document.querySelectorAll('.check-item input'))
          .map(i => i.checked);
        localStorage.setItem('pwa-checklist', JSON.stringify(state));
      });
    });
  </script>
</body>
</html>
